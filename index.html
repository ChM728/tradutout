<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#6c5ce7"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>TraduTout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f6fa;color:#1a1a2e;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e4e4f0;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.logo{font-size:20px;font-weight:700;color:#6c5ce7}
nav{display:flex;gap:4px}
.nav-btn{background:none;border:none;padding:6px 10px;border-radius:8px;font-size:12px;font-weight:500;color:#7070a0;cursor:pointer}
.nav-btn.active{color:#6c5ce7;background:rgba(108,92,231,0.1)}
main{padding:16px 12px;max-width:800px;margin:0 auto}
.panel{background:#fff;border:1px solid #e4e4f0;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.06);margin-bottom:16px}
.lang-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #f0f0f8;background:#fafafa}
select{background:#fff;border:1px solid #ddd;border-radius:10px;color:#1a1a2e;font-size:13px;font-weight:500;padding:7px 10px;flex:1}
.swap-btn{background:rgba(108,92,231,0.1);border:1px solid rgba(108,92,231,0.2);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:15px}
.col-label{padding:8px 14px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#9090b0}
textarea{width:100%;border:none;outline:none;resize:none;font-size:15px;line-height:1.6;font-family:inherit;padding:6px 14px 14px;min-height:130px;background:transparent;color:#1a1a2e}
.output{padding:6px 14px 14px;min-height:130px;font-size:15px;line-height:1.6;color:#3a3a6a;white-space:pre-wrap}
.sep{border-top:1px solid #f0f0f8}
.actions{padding:10px 14px;display:flex;align-items:center;gap:8px;background:#fafafa;flex-wrap:wrap}
.btn{background:linear-gradient(135deg,#6c5ce7,#a78bfa);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;padding:10px 18px;cursor:pointer;box-shadow:0 2px 8px rgba(108,92,231,0.3)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-ghost{background:#f0f0f8;border:1px solid #e0e0ee;border-radius:8px;color:#6060a0;font-size:13px;padding:8px 12px;cursor:pointer}
.char{margin-left:auto;font-size:11px;color:#a0a0c0}
.tab{display:none}
.tab.active{display:block}
.upload-zone{border:2px dashed rgba(108,92,231,0.3);border-radius:12px;margin:14px;padding:32px 20px;text-align:center;cursor:pointer;background:rgba(108,92,231,0.03)}
.upload-zone:active{border-color:#6c5ce7;background:rgba(108,92,231,0.08)}
.result-box{margin:0 14px 14px;background:rgba(108,92,231,0.04);border:1px solid rgba(108,92,231,0.15);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;color:#3a3a6a;white-space:pre-wrap;max-height:280px;overflow-y:auto}
.msg-area{padding:14px;min-height:200px;max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.5}
.msg.left{align-self:flex-start;background:#f0f0f8}
.msg.right{align-self:flex-end;background:rgba(108,92,231,0.12)}
.msg-orig{color:#1a1a2e}
.msg-trans{color:#7070a0;font-style:italic;font-size:11px;margin-top:4px;border-top:1px solid rgba(0,0,0,0.06);padding-top:4px}
.conv-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #f0f0f8;align-items:flex-end}
.conv-row textarea{min-height:40px;height:40px;border:1px solid #ddd;border-radius:10px;background:#fafafa;padding:9px 12px;font-size:14px}
.hist-item{padding:12px 16px;border-bottom:1px solid #f0f0f8}
.hist-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.hist-langs{font-size:11px;font-weight:600;color:#6c5ce7}
.hist-type{font-size:10px;background:#f0f0f8;border-radius:4px;padding:1px 6px;color:#9090b0}
.hist-date{font-size:10px;color:#b0b0c8;margin-left:auto}
.hist-prev{font-size:12px;color:#8080a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:50px 20px;color:#b0b0c8}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid rgba(108,92,231,0.3);color:#3a3a6a;font-size:13px;font-weight:500;padding:10px 20px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:999;display:none}
</style>
</head>
<body>
<header>
  <div class="logo">TraduTout</div>
  <nav>
    <button class="nav-btn active" onclick="showTab('text')">✍️ Texte</button>
    <button class="nav-btn" onclick="showTab('file')">📄 Fichier</button>
    <button class="nav-btn" onclick="showTab('conv')">💬 Conv.</button>
    <button class="nav-btn" onclick="showTab('history')">🕐 Hist.</button>
  </nav>
</header>
<main>

<!-- TEXTE -->
<div id="tab-text" class="tab active">
  <div class="panel">
    <div class="lang-bar">
      <select id="srcLang">
        <option value="fr">🇫🇷 Français</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="ar">🇸🇦 العربية</option>
        <option value="pt">🇵🇹 Português</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="nl">🇳🇱 Nederlands</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="pl">🇵🇱 Polski</option>
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="sv">🇸🇪 Svenska</option>
      </select>
      <button class="swap-btn" onclick="swapLangs()">⇄</button>
      <select id="tgtLang">
        <option value="en">🇬🇧 English</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="ar">🇸🇦 العربية</option>
        <option value="pt">🇵🇹 Português</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="nl">🇳🇱 Nederlands</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="pl">🇵🇱 Polski</option>
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="sv">🇸🇪 Svenska</option>
      </select>
    </div>
    <div class="col-label">Texte source</div>
    <textarea id="inputText" placeholder="Entrez votre texte ici…" oninput="updateChar()"></textarea>
    <div class="sep"></div>
    <div class="col-label">Traduction</div>
    <div id="outputText" class="output" style="color:#c0c0d8">La traduction apparaîtra ici</div>
    <div class="actions">
      <button class="btn" id="translateBtn" onclick="translateText()">Traduire →</button>
      <button class="btn-ghost" id="copyBtn" onclick="copyText()" style="display:none">📋 Copier</button>
      <button class="btn-ghost" onclick="clearText()">🗑</button>
      <span class="char" id="charCount">0 car.</span>
    </div>
  </div>
</div>

<!-- FICHIER -->
<div id="tab-file" class="tab">
  <div class="panel">
    <div class="lang-bar">
      <span style="font-size:12px;color:#9090b0;margin-right:4px">Traduire vers :</span>
      <select id="fileLang">
        <option value="en">🇬🇧 English</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="es">🇪🇸 Español</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
    </div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:32px;margin-bottom:10px">📎</div>
      <div style="font-size:15px;font-weight:500;color:#3a3a6a;margin-bottom:4px">Appuyez pour choisir un fichier</div>
      <div style="font-size:12px;color:#9090b0">JPG · PNG · WEBP · PDF</div>
      <input id="fileInput" type="file" accept="image/*,.pdf" style="display:none" onchange="handleFile(this.files[0])"/>
    </div>
    <div id="filePreview" style="display:none;margin:14px;background:#f8f8fc;border:1px solid #e8e8f5;border-radius:10px;padding:10px 14px;display:none;align-items:center;gap:10px">
      <span id="fileIcon" style="font-size:20px">📄</span>
      <span id="fileName" style="font-size:13px;font-weight:500;flex:1;color:#3a3a6a"></span>
      <button onclick="clearFile()" style="background:none;border:none;color:#b0b0c8;cursor:pointer;font-size:20px">×</button>
    </div>
    <div id="fileResult" class="result-box" style="display:none"></div>
    <div class="actions">
      <button class="btn" id="fileBtn" onclick="translateFile()" disabled>Traduire le fichier →</button>
      <button class="btn-ghost" id="fileCopyBtn" onclick="copyFile()" style="display:none">📋 Copier</button>
    </div>
  </div>
</div>

<!-- CONVERSATION -->
<div id="tab-conv" class="tab">
  <div class="panel">
    <div class="lang-bar">
      <select id="convLangA">
        <option value="fr">🇫🇷 Français</option>
        <option value="en">🇬🇧 English</option>
      </select>
      <span style="color:#9090b0">⇄</span>
      <select id="convLangB">
        <option value="en">🇬🇧 English</option>
        <option value="fr">🇫🇷 Français</option>
      </select>
      <button class="btn-ghost" onclick="clearConv()" style="margin-left:auto">🗑</button>
    </div>
    <div id="msgArea" class="msg-area">
      <div style="text-align:center;color:#c0c0d8;margin-top:20px;font-size:13px">Écrivez ci-dessous — chaque message sera traduit</div>
    </div>
    <div style="border-top:1px solid #f0f0f8">
      <div style="padding:6px 14px 2px;font-size:10px;color:#9090b0;text-transform:uppercase">🇫🇷 Côté A</div>
      <div class="conv-row">
        <textarea id="inputA" placeholder="Écrire ici…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('A')}"></textarea>
        <button class="btn" onclick="sendMsg('A')" style="padding:10px 14px">→</button>
      </div>
      <div style="padding:4px 14px 2px;font-size:10px;color:#9090b0;text-transform:uppercase;border-top:1px solid #f8f8fc">🇬🇧 Côté B</div>
      <div class="conv-row">
        <textarea id="inputB" placeholder="Write here…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg('B')}"></textarea>
        <button class="btn" onclick="sendMsg('B')" style="padding:10px 14px">→</button>
      </div>
    </div>
  </div>
</div>

<!-- HISTORIQUE -->
<div id="tab-history" class="tab">
  <div class="panel" id="histList">
    <div class="empty">
      <div style="font-size:36px;margin-bottom:10px">🕐</div>
      <div style="font-size:13px">Vos traductions apparaîtront ici</div>
    </div>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

<script>
const LANGS = {fr:'Français',en:'English',es:'Español',de:'Deutsch',ar:'العربية',pt:'Português',it:'Italiano',nl:'Nederlands',ru:'Русский',zh:'中文',ja:'日本語',ko:'한국어',pl:'Polski',tr:'Türkçe',sv:'Svenska'};
const FLAGS = {fr:'🇫🇷',en:'🇬🇧',es:'🇪🇸',de:'🇩🇪',ar:'🇸🇦',pt:'🇵🇹',it:'🇮🇹',nl:'🇳🇱',ru:'🇷🇺',zh:'🇨🇳',ja:'🇯🇵',ko:'🇰🇷',pl:'🇵🇱',tr:'🇹🇷',sv:'🇸🇪'};
let history = [];
let currentFile = null;
let fileResultText = '';

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function updateChar() {
  const v = document.getElementById('inputText').value;
  document.getElementById('charCount').textContent = v.length + ' car.';
}

function swapLangs() {
  const s = document.getElementById('srcLang');
  const t = document.getElementById('tgtLang');
  const tmp = s.value; s.value = t.value; t.value = tmp;
  const inp = document.getElementById('inputText');
  const out = document.getElementById('outputText');
  const outTxt = out.textContent;
  if (outTxt && outTxt !== 'La traduction apparaîtra ici') {
    inp.value = outTxt;
    out.textContent = inp.value;
    updateChar();
  }
}

async function callProxy(body) {
  const r = await fetch('/api/translate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const d = await r.json();
  return d?.content?.[0]?.text || '';
}

async function translateText() {
  const inp = document.getElementById('inputText').value.trim();
  if (!inp) return;
  const src = LANGS[document.getElementById('srcLang').value];
  const tgt = LANGS[document.getElementById('tgtLang').value];
  const tgtCode = document.getElementById('tgtLang').value;
  const srcCode = document.getElementById('srcLang').value;
  const btn = document.getElementById('translateBtn');
  const out = document.getElementById('outputText');
  btn.disabled = true;
  btn.textContent = '⏳ Traduction…';
  out.style.color = '#a0a0c0';
  out.textContent = 'Traduction en cours…';
  try {
    const result = await callProxy({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: 'Tu es un traducteur professionnel. Retourne uniquement le texte traduit.',
      messages: [{role: 'user', content: `Traduis de ${src} vers ${tgt}. Retourne uniquement la traduction.\n\n${inp}`}]
    });
    out.style.color = '#3a3a6a';
    out.textContent = result;
    document.getElementById('copyBtn').style.display = 'inline-block';
    addHistory('Texte', srcCode, tgtCode, inp.slice(0, 80));
  } catch(e) {
    out.style.color = '#ef4444';
    out.textContent = '❌ Erreur: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = 'Traduire →';
}

function copyText() {
  navigator.clipboard.writeText(document.getElementById('outputText').textContent);
  showToast('✅ Copié !');
}

function clearText() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').textContent = 'La traduction apparaîtra ici';
  document.getElementById('outputText').style.color = '#c0c0d8';
  document.getElementById('copyBtn').style.display = 'none';
  updateChar();
}

function handleFile(f) {
  if (!f) return;
  currentFile = f;
  document.getElementById('filePreview').style.display = 'flex';
  document.getElementById('fileIcon').textContent = f.type.startsWith('image') ? '🖼️' : '📄';
  document.getElementById('fileName').textContent = f.name;
  document.getElementById('fileBtn').disabled = false;
}

function clearFile() {
  currentFile = null;
  document.getElementById('filePreview').style.display = 'none';
  document.getElementById('fileResult').style.display = 'none';
  document.getElementById('fileBtn').disabled = true;
  document.getElementById('fileCopyBtn').style.display = 'none';
}

async function translateFile() {
  if (!currentFile) return;
  const tgt = LANGS[document.getElementById('fileLang').value];
  const tgtCode = document.getElementById('fileLang').value;
  const btn = document.getElementById('fileBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Analyse…';
  try {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(currentFile);
    });
    const result = await callProxy({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{role: 'user', content: [
        {type: 'image', source: {type: 'base64', media_type: currentFile.type, data: b64}},
        {type: 'text', text: `Extrais tout le texte visible dans cette image, puis traduis-le en ${tgt}.\n\nRéponds ainsi:\n\nORIGINAL:\n[texte extrait]\n\nTRADUCTION (${tgt}):\n[texte traduit]\n\nNe traduis pas les noms propres, codes techniques ou références.`}
      ]}]
    });
    fileResultText = result;
    const box = document.getElementById('fileResult');
    box.textContent = result;
    box.style.display = 'block';
    document.getElementById('fileCopyBtn').style.display = 'inline-block';
    addHistory('Fichier', 'auto', tgtCode, currentFile.name);
  } catch(e) {
    document.getElementById('fileResult').textContent = '❌ Erreur: ' + e.message;
    document.getElementById('fileResult').style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Traduire le fichier →';
}

function copyFile() {
  navigator.clipboard.writeText(fileResultText);
  showToast('✅ Copié !');
}

async function sendMsg(side) {
  const inp = document.getElementById('input' + side);
  const text = inp.value.trim();
  if (!text) return;
  const srcCode = document.getElementById('convLang' + side).value;
  const tgtCode = document.getElementById('convLang' + (side === 'A' ? 'B' : 'A')).value;
  const src = LANGS[srcCode];
  const tgt = LANGS[tgtCode];
  inp.value = '';
  const area = document.getElementById('msgArea');
  const msgEl = document.createElement('div');
  msgEl.className = 'msg ' + (side === 'A' ? 'left' : 'right');
  msgEl.innerHTML = `<div style="font-size:9px;text-transform:uppercase;color:#a0a0c0;margin-bottom:2px">${FLAGS[srcCode]} ${src}</div><div class="msg-orig">${text}</div><div class="msg-trans">→ ${FLAGS[tgtCode]} ...</div>`;
  area.appendChild(msgEl);
  area.scrollTop = area.scrollHeight;
  try {
    const result = await callProxy({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: 'Tu es un traducteur professionnel. Retourne uniquement le texte traduit.',
      messages: [{role: 'user', content: `Traduis de ${src} vers ${tgt}. Retourne uniquement la traduction.\n\n${text}`}]
    });
    msgEl.querySelector('.msg-trans').textContent = '→ ' + FLAGS[tgtCode] + ' ' + result;
    addHistory('Conversation', srcCode, tgtCode, text.slice(0, 60));
  } catch(e) {
    msgEl.querySelector('.msg-trans').textContent = '❌ Erreur';
  }
  area.scrollTop = area.scrollHeight;
}

function clearConv() {
  document.getElementById('msgArea').innerHTML = '<div style="text-align:center;color:#c0c0d8;margin-top:20px;font-size:13px">Écrivez ci-dessous — chaque message sera traduit</div>';
}

function addHistory(type, src, tgt, preview) {
  history.unshift({type, src, tgt, preview, date: new Date()});
  if (history.length > 50) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('histList');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty"><div style="font-size:36px;margin-bottom:10px">🕐</div><div style="font-size:13px">Vos traductions apparaîtront ici</div></div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="hist-item">
      <div class="hist-meta">
        <span class="hist-langs">${FLAGS[h.src]||'🌐'} ${h.src==='auto'?'Auto':LANGS[h.src]||h.src} → ${FLAGS[h.tgt]||'🌐'} ${LANGS[h.tgt]||h.tgt}</span>
        <span class="hist-type">${h.type}</span>
        <span class="hist-date">${h.date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})} · ${h.date.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</span>
      </div>
      <div class="hist-prev">${h.preview}</div>
    </div>
  `).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
